<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ff2b2b" />
    <title>Menu</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Pattern Background (generated by JS) -->
    <div class="bg-pattern" aria-hidden="true"></div>

    <!-- Compact App Header -->
    <header class="app-header" id="top">
      <div class="container">
        <div class="hero-row">
          <div class="hero-brand">
            <div class="logo-wrap">
              <img id="restaurantLogo" alt="شعار المطعم" loading="eager" />
            </div>
            <div class="brand-text">
              <h1 id="restaurantName" class="brand-name">.</h1>
              <p id="restaurantDesc" class="brand-desc">.</p>
            </div>
          </div>

          <div class="hero-actions">
            <!-- Share button removed ✅ -->
            <a id="callBtn" class="icon-btn" href="#" title="اتصال">
              <span class="icon">📞</span>
            </a>
          </div>
        </div>
      </div>
    </header>

    <!-- Sticky Tabs -->
    <nav class="tabs-bar" aria-label="أقسام المنيو">
      <div class="container">
        <div id="tabs" class="tabs" role="tablist"></div>
      </div>
    </nav>

    <!-- Content -->
    <main class="main">
      <div class="container">
        <div id="sections" class="sections"></div>
      </div>
    </main>

    <!-- Back To Top ✅ -->
    <button id="backToTop" class="top-btn" type="button" aria-label="الرجوع للأعلى">
      ⬆️
      <span class="top-text">للأعلى</span>
    </button>

    <!-- Cart FAB -->
    <button id="cartFab" class="cart-fab" type="button" aria-label="فتح السلة">
      <span class="cart-ico">🧺</span>
      <span class="cart-label">السلة</span>
      <span id="cartCount" class="cart-badge">0</span>
    </button>

    <!-- Cart Overlay -->
    <div id="cartOverlay" class="cart-overlay" hidden></div>

    <!-- Cart Drawer -->
    <aside id="cartDrawer" class="cart-drawer" aria-hidden="true">
      <div class="cart-head">
        <div class="cart-title">
          <h3>سلة الطلب</h3>
          <p id="cartSub" class="cart-sub">0 عنصر</p>
        </div>
        <button id="cartClose" class="cart-close" type="button" aria-label="إغلاق">✕</button>
      </div>

      <div id="cartItems" class="cart-items"></div>

      <div class="cart-customer">
  <label for="custName">الاسم</label>
  <input id="custName" type="text" placeholder="اكتب اسمك" autocomplete="name" />

  <label for="custPhone">رقم الموبايل</label>
  <input id="custPhone" type="tel" placeholder="مثال: 01xxxxxxxxx" autocomplete="tel" />

  <label for="custAddress">العنوان (اختياري)</label>
  <input id="custAddress" type="text" placeholder="المنطقة / الشارع" autocomplete="street-address" />
</div>

      <div class="cart-note">
        
        <label for="cartNote">ملاحظات (اختياري)</label>
        <textarea id="cartNote" rows="2" placeholder="مثال: بدون مخلل / صوص إضافي."></textarea>
      </div>

      <div class="cart-foot">
        <div class="cart-total">
          <span>الإجمالي</span>
          <strong id="cartTotal">0</strong>
        </div>

        <div class="cart-actions">
  <button id="cartContinue" class="btn-ghost" type="button">إضافة منتجات </button>
  <button id="cartCheckout" class="btn-primary" type="button">إتمام عبر واتساب</button>
  <button id="cartClear" class="btn-ghost" type="button">تفريغ</button>
</div>
    </aside>

    <!-- Loading Skeleton -->
    <div id="loading" class="loading">
      <div class="container">
        <div class="skeleton hero"></div>
        <div class="skeleton tabs"></div>
        <div class="skeleton grid"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
